<!DOCTYPE html>
<html lang="ru" class="h-full bg-[#0a0e1a]">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MaxSurge — 2FA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>&#x26A1;</text></svg>"/>
</head>
<body class="h-full flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 via-emerald-500 to-pink-500 rounded-xl flex items-center justify-center shadow-lg">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/></svg>
        </div>
        <span class="font-bold text-xl text-white">MaxSurge</span>
      </a>
      <h1 class="text-2xl font-bold text-white">Код двухфакторной аутентификации</h1>
      <p class="text-gray-500 text-sm mt-1">Откройте приложение-аутентификатор и введите код</p>
    </div>

    {% if msg %}
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">{{ msg }}</div>
    {% endif %}

    <div class="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-8">
      <form method="post" action="/auth/login-2fa" class="space-y-4">
        <div>
          <label class="block text-gray-400 text-xs font-medium mb-1.5">6-значный код</label>
          <input name="totp_code" type="text" required maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
                 placeholder="000000" autofocus
                 class="w-full bg-[#0a0e1a] border border-[#1e293b] rounded-lg px-4 py-3 text-white text-2xl font-mono text-center tracking-widest placeholder-gray-600 focus:outline-none focus:border-emerald-500 transition"/>
        </div>
        <button type="submit"
          class="w-full bg-gradient-to-r from-emerald-600 to-emerald-600 text-white py-3 rounded-lg font-medium hover:shadow-lg hover:shadow-emerald-500/30 transition-all">
          Подтвердить
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
      <a href="/login" class="hover:text-gray-300">&larr; Войти другим аккаунтом</a>
    </p>
  </div>
</body>
</html>
