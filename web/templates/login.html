<!DOCTYPE html>
<html lang="ru" class="h-full bg-[#0a0e1a]">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MaxSurge — Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>&#x26A1;</text></svg>"/>
</head>
<body class="h-full flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-600/20">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/></svg>
        </div>
        <span class="font-bold text-xl text-white">MaxSurge</span>
      </a>
      <h1 class="text-2xl font-bold text-white">Вход в аккаунт</h1>
      <p class="text-gray-500 text-sm mt-1">Войдите чтобы продолжить работу</p>
    </div>

    {% if msg %}
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">{{ msg }}</div>
    {% endif %}

    <div class="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-8">
      <form method="post" action="/auth/login" class="space-y-4">
        <div>
          <label class="block text-gray-400 text-xs font-medium mb-1.5">Email</label>
          <input name="email" type="email" required placeholder="your@email.com"
            class="w-full bg-[#0a0e1a] border border-[#1e293b] rounded-lg pl-4 pr-11 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/15 transition"/>
            <button type="button" onclick="window._toggleEye(this)" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-500 hover:text-emerald-400 transition" title="Показать/скрыть пароль">
              <svg data-eye="open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg data-eye="close" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>
        <div data-pw-toggle>
          <label class="block text-gray-400 text-xs font-medium mb-1.5">Пароль</label>
          <div class="relative">
          <input name="password" type="password" required placeholder="Минимум 6 символов"
            class="w-full bg-[#0a0e1a] border border-[#1e293b] rounded-lg px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/15 transition"/>
        </div>
        <button type="submit"
          class="w-full bg-gradient-to-r from-emerald-600 to-emerald-700 text-white py-3 rounded-lg font-medium hover:shadow-lg hover:shadow-emerald-500/20 transition-all">
          Войти
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-4">
      <a href="/forgot-password" class="text-gray-400 hover:text-emerald-600">Забыли пароль?</a>
    </p>
    <p class="text-center text-sm text-gray-500 mt-4">
      Нет аккаунта? <a href="/register" class="text-emerald-600 hover:text-emerald-600 font-medium">Зарегистрироваться</a>
    </p>
    <p class="text-center text-sm mt-2">
      <a href="/" class="text-gray-600 hover:text-gray-400 transition">← На главную</a>
    </p>
  </div>

<script>
window._toggleEye = function(btn) {
  var wrap = btn.closest('[data-pw-toggle]');
  if (!wrap) return;
  var inp = wrap.querySelector('input[name="password"], input[name="new_password"]');
  if (!inp) return;
  var open = wrap.querySelector('[data-eye="open"]');
  var close = wrap.querySelector('[data-eye="close"]');
  if (inp.type === 'password') {
    inp.type = 'text';
    if (open) open.style.display = 'none';
    if (close) close.style.display = '';
  } else {
    inp.type = 'password';
    if (open) open.style.display = '';
    if (close) close.style.display = 'none';
  }
};
// initial: hide close icons
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('[data-eye="close"]').forEach(function(el) { el.style.display = 'none'; });
});
</script>

</body>
</html>
