<!DOCTYPE html>
<html lang="ru" class="h-full bg-[#0a0e1a]">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MaxSurge — Новый пароль</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>&#x26A1;</text></svg>"/>
</head>
<body class="h-full flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 rounded-xl flex items-center justify-center shadow-lg">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/></svg>
        </div>
        <span class="font-bold text-xl text-white">MaxSurge</span>
      </a>
      <h1 class="text-2xl font-bold text-white">Новый пароль</h1>
      <p class="text-gray-500 text-sm mt-1">Введите новый пароль для вашего аккаунта</p>
    </div>

    {% if msg %}
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">{{ msg }}</div>
    {% endif %}

    <div class="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-8">
      {% if valid %}
      <form method="post" action="/auth/reset-password" class="space-y-4">
        <input type="hidden" name="token" value="{{ token }}"/>
        <div>
          <label class="block text-gray-400 text-xs font-medium mb-1.5">Новый пароль</label>
          <input name="new_password" type="password" required minlength="6" placeholder="Минимум 6 символов"
            class="w-full bg-[#0a0e1a] border border-[#1e293b] rounded-lg px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition"/>
        </div>
        <button type="submit"
          class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-lg font-medium hover:shadow-lg hover:shadow-indigo-500/30 transition-all">
          Сохранить пароль
        </button>
      </form>
      {% else %}
      <div class="text-center">
        <p class="text-red-400 text-sm mb-4">Ссылка недействительна или истекла.</p>
        <a href="/forgot-password" class="text-indigo-400 hover:text-indigo-300">Запросить новую</a>
      </div>
      {% endif %}
    </div>

    <p class="text-center text-sm mt-6">
      <a href="/login" class="text-gray-500 hover:text-gray-300">&larr; Войти</a>
    </p>
  </div>
</body>
</html>
