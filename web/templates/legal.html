<!DOCTYPE html>
<html lang="ru" class="bg-[#0a0e1a]">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page_title }} — MaxSurge</title>
  <meta name="description" content="{{ page_description }}"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://maxsurge.ru{{ page_url }}"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>&#x26A1;</text></svg>"/>
  <style>
    .prose h2{font-size:1.5rem;font-weight:700;color:#f1f5f9;margin-top:2.5rem;margin-bottom:1rem}
    .prose h3{font-size:1.125rem;font-weight:600;color:#e2e8f0;margin-top:1.75rem;margin-bottom:0.75rem}
    .prose p{color:#94a3b8;line-height:1.75;margin-bottom:1rem}
    .prose ul{color:#94a3b8;margin-bottom:1rem;padding-left:1.5rem;list-style:disc}
    .prose ul li{margin-bottom:0.5rem}
    .prose a{color:#34d399;text-decoration:underline}
    .prose a:hover{color:#a5b4fc}
    .prose strong{color:#e2e8f0}
  </style>
</head>
<body class="text-gray-300">
  <!-- Nav -->
  <nav class="bg-[#0a0e1a]/90 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-gradient-to-br from-emerald-500 via-emerald-600 to-emerald-700 rounded-lg flex items-center justify-center shadow-lg">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/></svg>
        </div>
        <span class="font-bold text-lg text-white">MaxSurge</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="/login" class="text-sm text-gray-400 hover:text-white transition">Войти</a>
        <a href="/register" class="text-sm bg-gradient-to-r from-emerald-600 to-emerald-600 text-white px-5 py-2 rounded-lg font-medium hover:shadow-lg hover:shadow-emerald-500/30 transition-all">Начать</a>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="max-w-3xl mx-auto px-6 py-16">
    <div class="mb-8">
      <a href="/" class="text-sm text-gray-500 hover:text-gray-300 transition">&larr; На главную</a>
    </div>
    <h1 class="text-4xl font-bold text-white mb-3">{{ page_title }}</h1>
    <p class="text-gray-500 text-sm mb-10">Последнее обновление: 8 апреля 2026</p>
    <div class="prose">
      {{ body|safe }}
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-[#1e293b] py-8 px-6 mt-16">
    <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-gray-600">
      <div>&copy; 2026 MaxSurge. Все права защищены.</div>
      <div class="flex gap-4">
        <a href="/terms" class="hover:text-gray-400 transition">Условия</a>
        <a href="/privacy" class="hover:text-gray-400 transition">Конфиденциальность</a>
        <a href="/contacts" class="hover:text-gray-400 transition">Контакты</a>
      </div>
    </div>
  </footer>
</body>
</html>
