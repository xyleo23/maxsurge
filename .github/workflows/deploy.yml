name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # never kill an in-flight deploy

jobs:
  deploy:
    name: Pull and restart service
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 109.196.165.67 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@109.196.165.67 'bash -s' <<'DEPLOY_EOF'
          set -e
          cd /root/max_leadfinder
          echo '=== git pull ==='
          git fetch origin main
          git reset --hard origin/main
          echo '=== pip install (if requirements changed) ==='
          if git diff HEAD@{1} HEAD --name-only 2>/dev/null | grep -q requirements.txt; then
            /root/max_leadfinder/venv/bin/pip install -r requirements.txt --quiet
            echo 'deps updated'
          else
            echo 'deps unchanged, skip pip install'
          fi
          echo '=== syntax check ==='
          /root/max_leadfinder/venv/bin/python -c 'import py_compile; py_compile.compile("main.py", doraise=True)'
          echo '=== restart service ==='
          systemctl restart maxsurge
          sleep 3
          echo '=== health check ==='
          curl -sf http://localhost:8090/health | python3 -c 'import sys,json; d=json.load(sys.stdin); print("status:",d["status"]); sys.exit(0 if d["status"]=="ok" else 1)'
          echo '=== changelog post ==='
          /root/maxsurge_publisher/venv/bin/python /root/maxsurge_publisher/scripts/auto_changelog.py || true
          echo '=== deploy OK ==='
          DEPLOY_EOF

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage"             -d "chat_id=${{ secrets.TG_CHAT_ID }}"             -d "text=❌ Deploy FAILED: ${{ github.sha }}" || true
