name: E2E (Playwright)

on:
  # Run after each deploy to main (workflow_run lets this react to deploy.yml success)
  workflow_run:
    workflows: ["Deploy to production"]
    types: [completed]
  # Manual trigger
  workflow_dispatch:
  # Also on PRs (against prod — for quick feedback)
  pull_request:
    branches: [main]

concurrency:
  group: e2e
  cancel-in-progress: false

jobs:
  e2e:
    # Skip if the upstream Deploy workflow failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tests/playwright
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests against prod
        env:
          BASE_URL: https://maxsurge.ru
          ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          CI: "1"
        run: npx playwright test

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: tests/playwright/playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: tests/playwright/test-results/
          retention-days: 7

      - name: Notify Telegram on failure
        if: failure() && env.TG_BOT_TOKEN != ''
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TG_CHAT_ID" \
            -d "text=❌ E2E failed: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || true
